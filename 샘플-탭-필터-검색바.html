<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>샘플 - 탭 + 필터칩 + 검색바 + 전체선택</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      /* Reset & Base */
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        font-family:
          "Pretendard",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          "Helvetica Neue",
          Arial,
          sans-serif;
        background-color: #f4f5f7;
        color: #333;
        font-size: 16px;
        line-height: 1.6;
      }
      ul,
      li {
        list-style: none;
      }
      a {
        text-decoration: none;
        color: inherit;
      }
      button {
        font-family: inherit;
        border: none;
        cursor: pointer;
        background: none;
        padding: 0;
      }
      img {
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
        display: block;
      }
      input {
        font-family: inherit;
      }
      svg {
        stroke-width: 2;
        fill: none;
        stroke: currentColor;
        stroke-linecap: round;
        stroke-linejoin: round;
        flex-shrink: 0;
        display: block;
      }

      /* Layout */
      .mobile-wrap {
        width: 100%;
        max-width: 480px;
        margin: 0 auto;
        background-color: #ffffff;
        min-height: 100vh;
      }

      /* Header */
      .app-header-sub {
        height: 56px;
        background: white;
        border-bottom: 1px solid #cccccc;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 16px;
        position: sticky;
        top: 0;
        z-index: 100;
      }
      .header-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 28px;
        height: 28px;
        cursor: pointer;
        transition: transform 0.2s;
        color: #333;
      }
      .header-btn:active {
        transform: scale(0.9);
      }
      .header-left {
        flex: 1 0 0;
        display: flex;
        justify-content: flex-start;
      }
      .header-title {
        flex: 3 0 0;
        font-size: 18px;
        font-weight: 600;
        text-align: center;
        color: #212121;
      }
      .header-right {
        flex: 1 0 0;
        display: flex;
        justify-content: flex-end;
        gap: 8px;
      }

      /* Page Tabs */
      .page-tabs {
        width: 100%;
        height: 44px;
        background: white;
        border-bottom: 1px solid #e8e8e9;
        display: flex;
        align-items: flex-end;
        padding: 0 20px 1px 20px;
        overflow-x: auto;
        white-space: nowrap;
        -ms-overflow-style: none;
        scrollbar-width: none;
        position: sticky;
        top: 56px;
        z-index: 99;
      }
      .page-tabs::-webkit-scrollbar {
        display: none;
      }
      .page-tab-item {
        height: 42px;
        padding: 10px 4px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        margin-right: 16px;
        position: relative;
        color: #bcbcbc;
        border-bottom: 2px solid transparent;
        flex-shrink: 0;
      }
      .page-tab-item.active {
        color: black;
        border-bottom: 2px solid black;
      }
      .page-tab-item:hover {
        opacity: 0.8;
      }

      /* Main Content */
      .sw-container {
        padding: 8px 16px 16px;
      }

      /* Filter Chip Section */
      .filter-chip-section {
        background: #fff;
        padding: 5px 16px;
        margin: 0 -16px;
      }
      .tabs-scroll-wrapper {
        overflow-x: auto;
        white-space: nowrap;
        -ms-overflow-style: none;
        scrollbar-width: none;
        display: flex;
        gap: 8px;
      }
      .tabs-scroll-wrapper::-webkit-scrollbar {
        display: none;
      }

      /* Single Chip */
      .filter-section {
        padding: 0 0 16px 0;
        display: flex;
        justify-content: flex-start;
        align-items: center;
      }
      .single-chip {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 6px 12px;
        border-radius: 100px;
        font-size: 14px;
        cursor: pointer;
        transition: all 0.2s;
        user-select: none;
        flex-shrink: 0;
      }
      .single-chip-off {
        background: #f5f5f6;
        color: #8a8a92;
      }
      .single-chip-on {
        background: #4e6ee4;
        color: white;
      }
      .single-chip:active {
        transform: scale(0.95);
      }

      /* Multi Chip */
      .multi-chip {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 6px 12px;
        border-radius: 100px;
        font-size: 14px;
        cursor: pointer;
        transition: all 0.2s;
        user-select: none;
        flex-shrink: 0;
      }
      .multi-chip-off {
        background: #fdfdfd;
        border: 1px solid #e6e4e4;
        color: #6d6d6d;
      }
      .multi-chip-on {
        background: #c7d3ff;
        border: 1px solid #4e6ee4;
        color: #4e6ee4;
      }
      .multi-chip:active {
        transform: scale(0.95);
      }

      /* 발급상태 칩 섹션 (신청완료일 때만 노출) */
      #issue-status-section {
        display: none;
      }
      #issue-status-section.visible {
        display: block;
      }

      /* ── 풀너비 검색바 ── */
      .search-full-section {
        background: white;
        padding: 8px 16px;
        margin: 0 -16px;
      }
      .search-full {
        width: 100%;
        height: 40px;
        background: #f9f9f9;
        border-radius: 8px;
        display: flex;
        align-items: center;
        padding: 0 12px;
        gap: 8px;
      }
      .search-full input {
        flex: 1;
        background: transparent;
        border: none;
        outline: none;
        font-size: 14px;
        color: black;
      }
      .search-full input::placeholder {
        color: #c6c6c8;
      }
      .search-full .search-del {
        width: 16px;
        height: 16px;
        cursor: pointer;
        display: none;
        color: #aaa;
        flex-shrink: 0;
      }
      .search-full.has-text .search-del {
        display: flex;
        align-items: center;
      }
      .search-full .search-icon {
        width: 20px;
        height: 20px;
        color: #aaa;
        flex-shrink: 0;
      }

      /* ── 리스트 인포 바 ── */
      .list-info-bar {
        position: sticky;
        top: 136px; /* 헤더(56px) + 탭(44px) + 기간바(36px) */
        z-index: 94;
        margin: 0 -16px;
        background: white;
        height: 36px;
      }

      .info-normal {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 16px;
        height: 100%;
      }
      .list-info-left {
        display: flex;
        align-items: center;
      }
      .total-count-text {
        font-size: 12px;
        color: #555;
        white-space: nowrap;
      }
      .total-count-text strong {
        font-weight: 600;
        color: #333;
      }
      .info-divider {
        font-size: 12px;
        color: #ccc;
        margin: 0 8px;
        user-select: none;
      }
      .view-count-select {
        display: inline-flex;
        align-items: center;
        gap: 2px;
        cursor: pointer;
        transition: opacity 0.2s;
        user-select: none;
      }
      .view-count-select:hover {
        opacity: 0.8;
      }
      .view-count-select:active {
        transform: scale(0.98);
      }
      .view-count-select-text {
        font-size: 12px;
        color: #2c2c2c;
        font-weight: 400;
        white-space: nowrap;
      }
      .view-count-select-arrow {
        width: 10px;
        height: 10px;
        margin-top: 1px;
      }
      .view-count-select-arrow svg {
        width: 10px;
        height: 10px;
      }

      /* 검색 아이콘 버튼 */
      .btn-search-toggle {
        width: 28px;
        height: 28px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        color: #555;
        transition:
          color 0.2s,
          transform 0.2s;
        flex-shrink: 0;
      }
      .btn-search-toggle:active {
        transform: scale(0.9);
      }

      /* 검색 상태 레이어 */
      .info-search {
        position: absolute;
        inset: 0;
        display: none;
        align-items: center;
        gap: 8px;
        padding: 0 16px;
        background: white;
      }

      /* 검색 열렸을 때 */
      .list-period-bar.search-open .period-normal {
        display: none;
      }
      .list-period-bar.search-open .info-search {
        display: flex;
      }

      /* 검색 입력창 */
      .search {
        flex: 1;
        height: 34px;
        background: #f2f2f4;
        border-radius: 8px;
        display: flex;
        align-items: center;
        padding: 0 10px;
        gap: 6px;
      }
      .search input {
        flex: 1;
        background: transparent;
        border: none;
        outline: none;
        font-size: 14px;
        color: black;
      }
      .search input::placeholder {
        color: #c6c6c8;
      }
      .search-del {
        width: 16px;
        height: 16px;
        cursor: pointer;
        display: none;
        color: #aaa;
        flex-shrink: 0;
      }
      .search.has-text .search-del {
        display: flex;
      }

      /* ── 기간 바 ── */
      .list-period-bar {
        position: sticky;
        top: 100px; /* 헤더(56px) + 탭(44px) */
        z-index: 95;
        margin: 0 -16px;
        background: white;
        height: 36px;
        overflow: hidden;
      }
      .period-normal {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 16px;
        height: 100%;
      }

      /* 기간 텍스트 버튼 */
      .text-select-button {
        display: inline-flex;
        align-items: center;
        gap: 2px;
        cursor: pointer;
        transition: opacity 0.2s;
        user-select: none;
      }
      .text-select-button:hover {
        opacity: 0.8;
      }
      .text-select-button:active {
        transform: scale(0.98);
      }
      .text-select-button-text {
        font-size: 12px;
        color: #333;
        font-weight: 400;
        white-space: nowrap;
      }
      .text-select-button-arrow {
        width: 10px;
        height: 10px;
        color: #555;
      }
      .text-select-button-arrow svg {
        width: 10px;
        height: 10px;
        transition: transform 0.2s;
      }
      .text-select-button.open .text-select-button-arrow svg {
        transform: rotate(-180deg);
      }

      /* 닫기 버튼 */
      .btn-search-close {
        font-size: 13px;
        color: #555;
        cursor: pointer;
        white-space: nowrap;
        flex-shrink: 0;
        padding: 4px 0;
        transition: color 0.2s;
      }
      .btn-search-close:hover {
        color: #333;
      }

      /* ── 전체선택 + 선택삭제 바 ── */
      .select-action-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 7px 16px;
        margin: 0 -16px;
        background: white;
        margin-bottom: 8px;
      }
      .checkbox-text {
        display: flex;
        align-items: center;
        gap: 8px;
        cursor: pointer;
        user-select: none;
      }
      .checkbox-text span {
        font-size: 14px;
        color: #333;
      }
      .checkbox {
        width: 20px;
        height: 20px;
        position: relative;
        cursor: pointer;
        user-select: none;
        flex-shrink: 0;
      }
      .checkbox-off {
        width: 100%;
        height: 100%;
        background: white;
        border: 1px solid #bdbdbd;
        border-radius: 2px;
      }
      .checkbox-on {
        width: 100%;
        height: 100%;
        background: #4e6ee4;
        border-radius: 2px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .checkbox-on svg {
        width: 14px;
        height: 14px;
        stroke: white;
      }
      .checkbox:active {
        transform: scale(0.9);
      }

      /* 선택 삭제 버튼 */
      .btn-delete-selected {
        background: white;
        color: #424242;
        height: 34px;
        padding: 0 12px;
        border-radius: 6px;
        border: 1px solid #e8e8e9;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .btn-delete-selected:hover {
        background: #f9f9f9;
      }
      .btn-delete-selected:active {
        transform: scale(0.98);
      }

      /* 기간 텍스트 */
      .period-label-row {
        font-size: 13px;
        color: #888;
        padding: 8px 0 4px 0;
        margin-bottom: 8px;
      }

      /* Placeholder Content */
      .placeholder-content {
        padding: 0 16px;
      }
      .placeholder-card {
        background: #f8f8f8;
        border: 1px dashed #ddd;
        border-radius: 8px;
        padding: 24px;
        text-align: center;
        color: #aaa;
        font-size: 14px;
        margin-bottom: 12px;
      }

      /* Bottom Sheet */
      .bottom-sheet-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
        display: none;
        align-items: flex-end;
        justify-content: center;
        z-index: 1000;
        animation: fadeIn 0.2s ease-out;
      }
      .bottom-sheet-overlay.active {
        display: flex;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      @keyframes slideUp {
        from {
          transform: translateY(100%);
        }
        to {
          transform: translateY(0);
        }
      }
      @keyframes slideDown {
        from {
          transform: translateY(0);
        }
        to {
          transform: translateY(100%);
        }
      }
      .bottom-sheet {
        width: 100%;
        max-width: 480px;
        background: white;
        border-top: 1px solid #d7d7d7;
        border-top-left-radius: 8px;
        border-top-right-radius: 8px;
        position: relative;
        animation: slideUp 0.3s ease-out;
        max-height: 90vh;
        display: flex;
        flex-direction: column;
      }
      .bottom-sheet.closing {
        animation: slideDown 0.3s ease-out;
      }
      .sheet-handle {
        width: 27px;
        height: 4px;
        background: #d9d9d9;
        border-radius: 100px;
        margin: 10px auto;
        cursor: grab;
      }
      .sheet-header {
        height: 21px;
        padding: 0 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        margin-bottom: 20px;
      }
      .sheet-title {
        font-size: 16px;
        font-weight: 700;
        color: black;
      }
      .btn-close {
        position: absolute;
        right: 20px;
        top: 0;
        width: 21px;
        height: 21px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #333;
      }
      .sheet-body {
        flex: 1;
        overflow-y: auto;
      }
      .option-list {
        list-style: none;
        padding: 0;
        margin: 0;
      }
      .option-list li {
        border-bottom: 1px solid #f0f0f0;
      }
      .option-list li:last-child {
        border-bottom: none;
      }
      .option-list li button {
        display: block;
        width: 100%;
        padding: 16px 20px;
        font-size: 16px;
        color: #333;
        text-align: left;
        background: none;
        border: none;
        cursor: pointer;
        transition: background-color 0.2s;
      }
      .option-list li button:hover {
        background-color: #f8f8f8;
      }
      .option-list li button:active {
        background-color: #f0f0f0;
      }
    </style>
  </head>

  <body>
    <div class="mobile-wrap">
      <!-- ① 앱 헤더 -->
      <header class="app-header-sub">
        <div class="header-left">
          <button type="button" class="header-btn" onclick="history.back()">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
            >
              <path d="M15 6l-6 6l6 6" />
            </svg>
          </button>
        </div>
        <h1 class="header-title">페이지 제목</h1>
        <div class="header-right"></div>
      </header>

      <main>
        <!-- ② 페이지 탭 -->
        <nav class="page-tabs" id="page-tab-nav">
          <div
            class="page-tab-item active"
            data-page="request"
            onclick="selectPageTab(this)"
          >
            탭
          </div>
          <div
            class="page-tab-item"
            data-page="issue"
            onclick="selectPageTab(this)"
          >
            탭
          </div>
        </nav>

        <!-- 탭 콘텐츠 - 신청 -->
        <div id="page-content-request" style="display: block">
          <div class="sw-container">
            <!-- ④ 신청 상태 single chip (미신청 / 신청완료) -->
            <section class="filter-chip-section" style="margin-bottom: 0">
              <div class="tabs-scroll-wrapper" id="apply-status-chip-group">
                <div
                  class="single-chip single-chip-on"
                  data-apply="미신청"
                  onclick="selectApplyChip(this)"
                >
                  텍스트싱글칩
                </div>
                <div
                  class="single-chip single-chip-off"
                  data-apply="신청완료"
                  onclick="selectApplyChip(this)"
                >
                  텍스트싱글칩
                </div>
              </div>
            </section>

            <!-- ⑤ 발급 상태 multi chip (신청완료 선택 시에만 노출) -->
            <section
              class="filter-chip-section"
              id="issue-status-section"
              style="margin-bottom: 0"
            >
              <div class="tabs-scroll-wrapper" id="status-chip-group">
                <div
                  class="multi-chip multi-chip-off"
                  data-status="전체"
                  onclick="toggleStatusChip(this)"
                >
                  전체
                </div>
                <div
                  class="multi-chip multi-chip-on"
                  data-status="미발급"
                  onclick="toggleStatusChip(this)"
                >
                  ✓ 텍스트멀티칩
                </div>
                <div
                  class="multi-chip multi-chip-on"
                  data-status="발급대기"
                  onclick="toggleStatusChip(this)"
                >
                  ✓ 텍스트멀티칩
                </div>
                <div
                  class="multi-chip multi-chip-off"
                  data-status="발급실패"
                  onclick="toggleStatusChip(this)"
                >
                  텍스트멀티칩
                </div>
              </div>
            </section>

            <!-- 풀너비 검색바 (세금계산서 신청 스타일) -->
            <div class="search-full-section">
              <div class="search-full" id="main-search">
                <input
                  type="text"
                  placeholder="접수번호를 입력해주세요"
                  oninput="handleFullSearchInput(this)"
                />
                <div class="search-del" onclick="clearFullSearch(this)">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 24 24"
                    width="16"
                    height="16"
                  >
                    <circle cx="12" cy="12" r="9" />
                    <path d="M9 9l6 6M15 9l-6 6" />
                  </svg>
                </div>
                <div class="search-icon">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="20"
                    height="20"
                    viewBox="0 0 24 24"
                  >
                    <path d="M10 10m-7 0a7 7 0 1 0 14 0a7 7 0 1 0 -14 0" />
                    <path d="M21 21l-6 -6" />
                  </svg>
                </div>
              </div>
            </div>

            <section class="transaction-list-section">
              <!-- ⑥ 기간 바 (검색 오버레이 포함) -->
              <div class="list-period-bar" id="list-period-bar">
                <!-- 일반 상태 -->
                <div class="period-normal">
                  <button
                    type="button"
                    class="text-select-button"
                    id="period-btn"
                    onclick="showPeriodSheet(this)"
                  >
                    <span
                      class="text-select-button-text"
                      id="selected-period-text"
                      >최근 1개월</span
                    >
                    <div class="text-select-button-arrow">
                      <svg
                        xmlns="http://www.w3.org/2000/svg"
                        viewBox="0 0 24 24"
                      >
                        <path d="M6 9l6 6l6 -6" />
                      </svg>
                    </div>
                  </button>
                  <button
                    type="button"
                    class="btn-search-toggle"
                    onclick="openSearch()"
                  >
                    <svg
                      xmlns="http://www.w3.org/2000/svg"
                      width="18"
                      height="18"
                      viewBox="0 0 24 24"
                    >
                      <path d="M10 10m-7 0a7 7 0 1 0 14 0a7 7 0 1 0 -14 0" />
                      <path d="M21 21l-6 -6" />
                    </svg>
                  </button>
                </div>
                <!-- 검색 상태 -->
                <div class="info-search">
                  <div class="search" id="sample-search">
                    <svg
                      xmlns="http://www.w3.org/2000/svg"
                      width="16"
                      height="16"
                      viewBox="0 0 24 24"
                      style="color: #aaa; flex-shrink: 0"
                    >
                      <path d="M10 10m-7 0a7 7 0 1 0 14 0a7 7 0 1 0 -14 0" />
                      <path d="M21 21l-6 -6" />
                    </svg>
                    <input
                      type="text"
                      id="search-input"
                      placeholder="접수번호를 입력해주세요"
                      oninput="handleSearchInput(this)"
                    />
                    <div class="search-del" onclick="clearSearch(this)">
                      <svg
                        xmlns="http://www.w3.org/2000/svg"
                        viewBox="0 0 24 24"
                        width="16"
                        height="16"
                      >
                        <circle cx="12" cy="12" r="9" />
                        <path d="M9 9l6 6M15 9l-6 6" />
                      </svg>
                    </div>
                  </div>
                  <button
                    type="button"
                    class="btn-search-close"
                    onclick="closeSearch()"
                  >
                    닫기
                  </button>
                </div>
              </div>

              <!-- ⑦ 전체선택 + 선택 삭제 -->
              <div class="select-action-bar">
                <div class="checkbox-text" onclick="toggleSelectAll(this)">
                  <div
                    class="checkbox"
                    data-checked="false"
                    id="select-all-checkbox"
                  >
                    <div class="checkbox-off"></div>
                  </div>
                  <span>전체선택</span>
                </div>
                <button
                  type="button"
                  class="btn-delete-selected"
                  id="btn-delete-selected"
                  onclick="deleteSelected()"
                >
                  선택 삭제
                </button>
              </div>

              <!-- ③ 기간 텍스트 -->
              <div class="period-label-row">2025년 8월</div>

              <!-- 플레이스홀더 카드 -->
              <div class="placeholder-content">
                <div class="placeholder-card">카드 아이템 1</div>
                <div class="placeholder-card">카드 아이템 2</div>
                <div class="placeholder-card">카드 아이템 3</div>
              </div>
            </section>
          </div>
        </div>

        <!-- 탭 콘텐츠 - 발급 내역 -->
        <div id="page-content-issue" style="display: none">
          <div class="sw-container">
            <div class="placeholder-card" style="margin-top: 24px">
              발급 내역 콘텐츠 영역
            </div>
          </div>
        </div>
      </main>
    </div>

    <!-- 기간 선택 Bottom Sheet -->
    <div class="bottom-sheet-overlay" id="period-sheet-overlay">
      <div class="bottom-sheet" id="period-sheet">
        <div class="sheet-handle"></div>
        <div class="sheet-header">
          <div class="sheet-title">기간 선택</div>
          <div class="btn-close" onclick="closePeriodSheet()">
            <svg width="24" height="24" viewBox="0 0 24 24">
              <path d="M18 6L6 18M6 6l12 12" />
            </svg>
          </div>
        </div>
        <div class="sheet-body" style="padding: 0">
          <ul class="option-list">
            <li>
              <button type="button" onclick="selectPeriod('최근 1개월')">
                최근 1개월
              </button>
            </li>
            <li>
              <button type="button" onclick="selectPeriod('최근 6개월')">
                최근 6개월
              </button>
            </li>
            <li>
              <button type="button" onclick="selectPeriod('최근 1년')">
                최근 1년
              </button>
            </li>
            <li>
              <button type="button" onclick="selectPeriod('기간 설정')">
                기간 설정
              </button>
            </li>
          </ul>
        </div>
      </div>
    </div>

    <!-- 보기 설정 Bottom Sheet -->
    <div class="bottom-sheet-overlay" id="view-count-sheet-overlay">
      <div class="bottom-sheet" id="view-count-sheet">
        <div class="sheet-handle"></div>
        <div class="sheet-header">
          <div class="sheet-title">보기 설정</div>
          <div class="btn-close" onclick="closeViewCountSheet()">
            <svg width="24" height="24" viewBox="0 0 24 24">
              <path d="M18 6L6 18M6 6l12 12" />
            </svg>
          </div>
        </div>
        <div class="sheet-body">
          <ul class="option-list">
            <li>
              <button type="button" onclick="selectViewCount(10)">
                10건씩 보기
              </button>
            </li>
            <li>
              <button type="button" onclick="selectViewCount(20)">
                20건씩 보기
              </button>
            </li>
            <li>
              <button type="button" onclick="selectViewCount(30)">
                30건씩 보기
              </button>
            </li>
            <li>
              <button type="button" onclick="selectViewCount(40)">
                40건씩 보기
              </button>
            </li>
          </ul>
        </div>
      </div>
    </div>

    <script>
      /* ── 페이지 탭 ── */
      function selectPageTab(tab) {
        const nav = tab.closest("#page-tab-nav");
        nav
          .querySelectorAll(".page-tab-item")
          .forEach((t) => t.classList.remove("active"));
        tab.classList.add("active");
        const page = tab.getAttribute("data-page");
        document.getElementById("page-content-request").style.display =
          page === "request" ? "block" : "none";
        document.getElementById("page-content-issue").style.display =
          page === "issue" ? "block" : "none";
      }

      /* ── 신청 상태 single chip (미신청 / 신청완료) ── */
      function selectApplyChip(chip) {
        const group = chip.closest("#apply-status-chip-group");
        // 모두 off
        group.querySelectorAll(".single-chip").forEach((c) => {
          c.classList.remove("single-chip-on");
          c.classList.add("single-chip-off");
        });
        // 클릭한 것만 on
        chip.classList.remove("single-chip-off");
        chip.classList.add("single-chip-on");

        // 발급 상태 칩 섹션: 신청완료일 때만 표시
        const issueSection = document.getElementById("issue-status-section");
        if (chip.getAttribute("data-apply") === "신청완료") {
          issueSection.classList.add("visible");
        } else {
          issueSection.classList.remove("visible");
        }
      }

      /* ── 발급 상태 multi chip ── */
      function toggleMultiChip(chip, forceState) {
        const isOn = chip.classList.contains("multi-chip-on");
        const turnOn = forceState !== undefined ? forceState : !isOn;
        const cleanLabel = chip.textContent.replace(/✓/g, "").trim();
        if (turnOn && !isOn) {
          chip.classList.replace("multi-chip-off", "multi-chip-on");
          chip.textContent = "✓ " + cleanLabel;
        } else if (!turnOn && isOn) {
          chip.classList.replace("multi-chip-on", "multi-chip-off");
          chip.textContent = cleanLabel;
        }
      }

      function toggleStatusChip(chip) {
        const status = chip.getAttribute("data-status");
        const group = chip.closest(".tabs-scroll-wrapper");
        if (!group) return;
        const allChip = group.querySelector('[data-status="전체"]');
        if (status === "전체") {
          const isTurningOn = !chip.classList.contains("multi-chip-on");
          toggleMultiChip(chip, isTurningOn);
          group.querySelectorAll(".multi-chip").forEach((c) => {
            if (c !== chip) toggleMultiChip(c, false);
          });
        } else {
          toggleMultiChip(chip);
          if (allChip) toggleMultiChip(allChip, false);
          const anyOtherOn = Array.from(
            group.querySelectorAll('.multi-chip:not([data-status="전체"])'),
          ).some((c) => c.classList.contains("multi-chip-on"));
          if (!anyOtherOn && allChip) toggleMultiChip(allChip, true);
        }
      }

      /* ── 검색바 (기간 바) ── */
      function openSearch() {
        document.getElementById("list-period-bar").classList.add("search-open");
        document.getElementById("search-input").focus();
      }
      function closeSearch() {
        document
          .getElementById("list-period-bar")
          .classList.remove("search-open");
        const input = document.getElementById("search-input");
        input.value = "";
        document.getElementById("sample-search").classList.remove("has-text");
      }

      function handleFullSearchInput(input) {
        input
          .closest(".search-full")
          .classList.toggle("has-text", input.value.trim() !== "");
      }
      function clearFullSearch(btn) {
        const box = btn.closest(".search-full");
        box.querySelector("input").value = "";
        box.classList.remove("has-text");
        box.querySelector("input").focus();
      }

      function handleSearchInput(input) {
        input
          .closest(".search")
          .classList.toggle("has-text", input.value.trim() !== "");
      }
      function clearSearch(btn) {
        const search = btn.closest(".search");
        const input = search.querySelector("input");
        input.value = "";
        search.classList.remove("has-text");
        input.focus();
      }

      /* ── 전체선택 / 선택 삭제 ── */
      function toggleCheckbox(checkbox) {
        const isChecked = checkbox.dataset.checked === "true";
        if (isChecked) {
          checkbox.dataset.checked = "false";
          checkbox.innerHTML = '<div class="checkbox-off"></div>';
        } else {
          checkbox.dataset.checked = "true";
          checkbox.innerHTML =
            '<div class="checkbox-on"><svg viewBox="0 0 14 14"><polyline points="2,7 6,11 12,3"/></svg></div>';
        }
        updateDeleteBtn();
      }

      function toggleSelectAll(wrapper) {
        const cb = wrapper.querySelector(".checkbox");
        toggleCheckbox(cb);
      }

      function updateDeleteBtn() {
        const cb = document.getElementById("select-all-checkbox");
        const btn = document.getElementById("btn-delete-selected");
        if (cb.dataset.checked === "true") {
          btn.classList.add("has-selection");
        } else {
          btn.classList.remove("has-selection");
        }
      }

      function deleteSelected() {
        const cb = document.getElementById("select-all-checkbox");
        if (cb.dataset.checked !== "true") {
          alert("삭제할 항목을 선택해주세요.");
          return;
        }
        alert("선택 삭제 동작");
      }

      /* ── 기간 선택 ── */
      function showPeriodSheet(btn) {
        btn.classList.add("open");
        document.getElementById("period-sheet-overlay").classList.add("active");
      }
      function closePeriodSheet() {
        document.getElementById("period-btn").classList.remove("open");
        const sheet = document.getElementById("period-sheet");
        const overlay = document.getElementById("period-sheet-overlay");
        sheet.classList.add("closing");
        setTimeout(() => {
          overlay.classList.remove("active");
          sheet.classList.remove("closing");
        }, 280);
      }
      function selectPeriod(val) {
        document.getElementById("selected-period-text").textContent = val;
        closePeriodSheet();
      }
      document
        .getElementById("period-sheet-overlay")
        .addEventListener("click", function (e) {
          if (e.target === this) closePeriodSheet();
        });

      /* ── n건씩 보기 ── */
      function showViewCountSheet() {
        document
          .getElementById("view-count-sheet-overlay")
          .classList.add("active");
      }
      function closeViewCountSheet() {
        const sheet = document.getElementById("view-count-sheet");
        const overlay = document.getElementById("view-count-sheet-overlay");
        sheet.classList.add("closing");
        setTimeout(() => {
          overlay.classList.remove("active");
          sheet.classList.remove("closing");
        }, 280);
      }
      function selectViewCount(n) {
        document.getElementById("view-count-text").textContent =
          n + "건씩 보기";
        closeViewCountSheet();
      }

      document
        .getElementById("view-count-sheet-overlay")
        .addEventListener("click", function (e) {
          if (e.target === this) closeViewCountSheet();
        });
    </script>
  </body>
</html>
